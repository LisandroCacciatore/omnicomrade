<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Entrenando - TechFitness</title>
    <link rel="icon" type="image/png" href="assets/img/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&family=IBM+Plex+Mono:wght@600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="js/tailwind-config.js"></script>
    <style>
        * { font-family: 'Space Grotesk', sans-serif; touch-action: manipulation; }
        .font-mono { font-family: 'IBM Plex Mono', monospace; }
        body { background: #0B1218; color: #E2E8F0; overflow: hidden; } /* Evita scroll accidental */
        
        /* Animaciones para las tarjetas */
        .card-active { transform: translateX(0) scale(1); opacity: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; }
        .card-next { transform: translateX(100%) scale(0.95); opacity: 0.5; position: absolute; top: 0; left: 0; right: 0; z-index: 5; }
        .card-done { transform: translateX(-100%) scale(0.95); opacity: 0; position: absolute; top: 0; left: 0; right: 0; pointer-events: none; }
        

    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="flex items-center justify-between p-5 border-b border-[#1E293B] shrink-0">
        <button id="hamburger-btn" class="lg:hidden size-10 flex items-center justify-center rounded-lg hover:bg-slate-800 transition-colors mr-2">
                <span class="material-symbols-rounded text-slate-400">menu</span>
            </button><div>
            <div class="text-[10px] font-bold text-slate-500 uppercase tracking-widest" id="session-routine-name">Cargando...</div>
            <div class="text-xl font-black text-white leading-none" id="session-day-name">Preparando sesión</div>
        </div>
        <button id="btn-cancel-workout" class="w-10 h-10 rounded-full bg-[#1E293B] flex items-center justify-center text-slate-400 hover:text-white">
            <span class="material-symbols-rounded">close</span>
        </button>
    </header>

    <div class="h-1.5 w-full bg-[#1E293B] shrink-0">
        <div id="workout-progress" class="h-full bg-[#3B82F6] transition-all duration-300" style="width: 0%25;"></div>
    </div>

    
    <div id="wellbeing-banner" style="display:none;margin:12px 16px 0"></div>
    
    <div id="load-suggestion" style="display:none;margin:0 16px"></div>

    <main class="flex-1 relative overflow-hidden p-5" id="exercise-deck">
        </main>


    <div id="rest-timer" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-[#3B82F6] text-white px-6 py-3 rounded-full font-mono font-black text-2xl shadow-[0_0_20px_rgba(59,130,246,0.4)] hidden items-center gap-3 z-40 cursor-pointer">
        <span class="material-symbols-rounded animate-pulse">timer</span>
        <span id="timer-display">01:30</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/supabase.js"></script>
    <script type="module" src="js/auth-guard.js"></script>
    <script type="module" src="js/training-engine.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/sidebar.js"></script>
    <script type="module" src="js/workout-session.js"></script>
</body>
</html>
