<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Check rápido — TechFitness</title>
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  <style>
    * { font-family: 'Space Grotesk', sans-serif; box-sizing: border-box; touch-action: manipulation; }
    body { background: #0B1218; color: #E2E8F0; min-height: 100vh; }

    /* Emoji tap buttons */
    .q-btn {
      flex: 1; padding: 10px 4px; border-radius: 12px;
      border: 2px solid #1E293B; background: #161E26;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .q-btn:active { transform: scale(.92); }
    .q-btn .e { font-size: 26px; line-height: 1; }
    .q-btn .l { font-size: 9px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .04em; }

    .q-btn.sel-sleep  { border-color: #3B82F6; background: rgba(59,130,246,.15); }
    .q-btn.sel-sleep .l { color: #60A5FA; }
    .q-btn.sel-pain   { border-color: #EF4444; background: rgba(239,68,68,.15); }
    .q-btn.sel-pain .l { color: #F87171; }
    .q-btn.sel-energy { border-color: #10B981; background: rgba(16,185,129,.15); }
    .q-btn.sel-energy .l { color: #34D399; }

    .zone-btn {
      padding: 6px 12px; border-radius: 999px; font-size: 11px; font-weight: 700;
      border: 1px solid #1E293B; background: #0B1218; color: #475569; cursor: pointer; transition: all .15s;
    }
    .zone-btn.active { border-color: #EF4444; background: rgba(239,68,68,.12); color: #F87171; }

    .row-label {
      font-size: 11px; font-weight: 800; color: #64748B;
      text-transform: uppercase; letter-spacing: .06em;
      width: 20px; flex-shrink: 0; text-align: center;
      writing-mode: vertical-rl; transform: rotate(180deg);
    }

    #btn-start {
      width: 100%; padding: 18px; border-radius: 18px;
      font-size: 18px; font-weight: 900;
      background: #1E293B; color: #475569;
      border: none; cursor: not-allowed;
      transition: all .25s;
    }
    #btn-start.ready {
      cursor: pointer;
      box-shadow: 0 0 32px rgba(16,185,129,.3);
    }
    #btn-start.ready:active { transform: scale(.97); }

    .saving-overlay {
      position: fixed; inset: 0; background: #0B1218;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 50; opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .saving-overlay.show { opacity: 1; pointer-events: all; }

    #score-bar-fill { transition: width .4s ease; }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <header class="px-5 pt-5 pb-2 flex items-center justify-between shrink-0">
    <button id="btn-back" class="w-9 h-9 rounded-full bg-[#161E26] border border-[#1E293B] flex items-center justify-center text-slate-500 hover:text-white transition-colors">
      <span class="material-symbols-rounded text-[20px]">arrow_back</span>
    </button>
    <div class="flex items-center gap-1.5">
      <div class="w-2 h-2 rounded-full bg-[#1E293B]" id="dot-0"></div>
      <div class="w-2 h-2 rounded-full bg-[#1E293B]" id="dot-1"></div>
      <div class="w-2 h-2 rounded-full bg-[#1E293B]" id="dot-2"></div>
    </div>
    <button id="btn-skip" type="button" class="text-[#334155] text-xs font-600 bg-none border-none cursor-pointer hover:text-slate-400 transition-colors">Omitir</button>
  </header>

  <main class="flex-1 px-5 py-3 flex flex-col gap-4 max-w-lg mx-auto w-full">

    <div class="text-center">
      <div class="text-3xl mb-1">🧠</div>
      <h1 class="text-xl font-900 text-white">¿Cómo llegás hoy?</h1>
      <p class="text-xs text-slate-500 mt-1">30 segundos · tu entrenador lo ve</p>
    </div>

    <!-- ── Sueño ── -->
    <div>
      <p class="text-[10px] font-800 text-slate-500 uppercase tracking-widest mb-1.5">😴 Sueño</p>
      <div class="flex gap-1.5" id="sleep-btns">
        <button class="q-btn" data-q="sleep" data-val="1"><span class="e">😫</span><span class="l">Muy mal</span></button>
        <button class="q-btn" data-q="sleep" data-val="2"><span class="e">😔</span><span class="l">Mal</span></button>
        <button class="q-btn" data-q="sleep" data-val="3"><span class="e">😐</span><span class="l">Regular</span></button>
        <button class="q-btn" data-q="sleep" data-val="4"><span class="e">😊</span><span class="l">Bien</span></button>
        <button class="q-btn" data-q="sleep" data-val="5"><span class="e">🤩</span><span class="l">Muy bien</span></button>
      </div>
    </div>

    <!-- ── Dolor ── -->
    <div>
      <p class="text-[10px] font-800 text-slate-500 uppercase tracking-widest mb-1.5">💪 Dolor</p>
      <div class="flex gap-1.5" id="pain-btns">
        <button class="q-btn" data-q="pain" data-val="1"><span class="e">✅</span><span class="l">Nada</span></button>
        <button class="q-btn" data-q="pain" data-val="2"><span class="e">🟡</span><span class="l">Leve</span></button>
        <button class="q-btn" data-q="pain" data-val="3"><span class="e">🟠</span><span class="l">Moderado</span></button>
        <button class="q-btn" data-q="pain" data-val="4"><span class="e">🔴</span><span class="l">Intenso</span></button>
        <button class="q-btn" data-q="pain" data-val="5"><span class="e">🚨</span><span class="l">Muy alto</span></button>
      </div>
      <!-- Zona -->
      <div id="pain-zone-section" class="hidden mt-2">
        <p class="text-[9px] font-bold text-slate-600 uppercase tracking-widest mb-1.5">¿Dónde?</p>
        <div class="flex flex-wrap gap-1.5" id="pain-zone-btns">
          <button class="zone-btn" data-zone="cuello">Cuello</button>
          <button class="zone-btn" data-zone="hombro">Hombro</button>
          <button class="zone-btn" data-zone="espalda_alta">Espalda alta</button>
          <button class="zone-btn" data-zone="espalda_baja">Lumbar</button>
          <button class="zone-btn" data-zone="cadera">Cadera</button>
          <button class="zone-btn" data-zone="rodilla">Rodilla</button>
          <button class="zone-btn" data-zone="tobillo">Tobillo</button>
          <button class="zone-btn" data-zone="general">General</button>
        </div>
      </div>
    </div>

    <!-- ── Energía ── -->
    <div>
      <p class="text-[10px] font-800 text-slate-500 uppercase tracking-widest mb-1.5">⚡ Energía</p>
      <div class="flex gap-1.5" id="energy-btns">
        <button class="q-btn" data-q="energy" data-val="1"><span class="e">🪫</span><span class="l">Sin nada</span></button>
        <button class="q-btn" data-q="energy" data-val="2"><span class="e">😴</span><span class="l">Poca</span></button>
        <button class="q-btn" data-q="energy" data-val="3"><span class="e">👍</span><span class="l">Normal</span></button>
        <button class="q-btn" data-q="energy" data-val="4"><span class="e">💪</span><span class="l">Buena</span></button>
        <button class="q-btn" data-q="energy" data-val="5"><span class="e">🔥</span><span class="l">Top</span></button>
      </div>
    </div>

    <!-- ── Score live ── -->
    <div id="score-display" class="hidden bg-[#161E26] border border-[#1E293B] rounded-2xl p-4">
      <div class="flex items-center justify-between mb-2">
        <span id="score-emoji" class="text-xl">⚪</span>
        <span id="score-label" class="text-xs font-bold text-slate-400"></span>
        <span id="score-num" class="font-mono font-black text-lg text-white"></span>
      </div>
      <div class="h-2 bg-[#0B1218] rounded-full overflow-hidden">
        <div id="score-bar-fill" class="h-full rounded-full" style="width:0%"></div>
      </div>
    </div>

    <!-- ── Nota opcional (colapsada) ── -->
    <div>
      <textarea id="wellbeing-notes" rows="2"
        class="w-full bg-[#161E26] border border-[#1E293B] rounded-xl px-3 py-2.5 text-sm text-white focus:border-[#3B82F6] outline-none resize-none transition-colors"
        placeholder="Nota para tu entrenador (opcional)…" maxlength="200"></textarea>
    </div>

    <!-- ── CTA ── -->
    <div class="pb-4">
      <button id="btn-start" type="button" disabled>
        Comenzar entrenamiento →
      </button>
      <p id="missing-hint" class="text-center text-xs text-slate-600 mt-2">Respondé sueño, dolor y energía</p>
    </div>

  </main>

  <div class="saving-overlay" id="saving-overlay">
    <span class="material-symbols-rounded text-primary text-[48px] animate-spin">progress_activity</span>
    <p class="text-white font-bold">Guardando…</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/training-engine.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/wellbeing-check.js"></script>
</body>
</html>
