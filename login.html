<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | TechFitness</title>
    <link rel="icon" type="image/png" href="assets/img/favicon.png" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script type="module" src="js/tailwind-config.js"></script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #161E26 0%, #0B1218 100%);
        }
        .material-symbols-rounded {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(22, 30, 38, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden">
    <!-- Fondo decorativo -->
    <div class="fixed inset-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/20 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-success/10 rounded-full blur-[120px]"></div>
    </div>

    <div class="w-full max-w-[400px] glass-panel rounded-2xl p-8 shadow-2xl z-10 transition-all duration-500 hover:shadow-primary/5">
        <!-- Logo -->
        <div class="flex flex-col items-center gap-4 mb-8">
            <div class="size-20 bg-slate-900/50 rounded-2xl flex items-center justify-center p-2 shadow-lg hover:scale-105 transition-transform">
                <img src="assets/img/logo.png" alt="TechFitness Logo" class="w-full h-full object-contain" />
            </div>
            <div class="text-center">
                <h1 class="text-3xl font-black tracking-tight">Tech<span class="text-primary">Fitness</span></h1>
                <p class="text-slate-400 text-sm font-medium mt-1">Gestión Inteligente de Gimnasios</p>
            </div>
        </div>

        <!-- Formulario -->
        <form id="login-form" class="flex flex-col gap-5">
            <div class="flex flex-col gap-2">
                <label class="text-xs font-bold uppercase tracking-wider text-slate-400 ml-1">Email</label>
                <div class="relative group">
                    <span class="material-symbols-rounded absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors text-[20px]">mail</span>
                    <input type="email" id="email" required autocomplete="email"
                        class="w-full bg-slate-900/50 border border-slate-800 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary text-white py-3 pl-12 pr-4 transition-all placeholder:text-slate-600 valid:border-success/50 invalid:border-danger/50"
                        placeholder="tu@email.com" />
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-xs font-bold uppercase tracking-wider text-slate-400 ml-1">Contraseña</label>
                <div class="relative group">
                    <span class="material-symbols-rounded absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors text-[20px]">lock</span>
                    <input type="password" id="password" required autocomplete="current-password"
                        class="w-full bg-slate-900/50 border border-slate-800 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary text-white py-3 pl-12 pr-4 transition-all placeholder:text-slate-600"
                        placeholder="••••••••" />
                </div>
            </div>

            <!-- Error Message -->
            <div id="error-message" class="hidden flex items-center gap-2 text-danger text-sm font-bold bg-danger/10 p-3 rounded-lg border border-danger/20">
                <span class="material-symbols-rounded text-[18px]">error</span>
                <span id="error-text">Credenciales incorrectas</span>
            </div>

            <button type="submit" id="login-btn"
                class="flex items-center justify-center gap-2 w-full rounded-xl bg-primary hover:bg-blue-600 text-white font-bold py-4 px-6 transition-all shadow-lg shadow-primary/20 mt-2 group">
                <span id="btn-text">Iniciar Sesión</span>
                <span id="btn-spinner" class="hidden animate-spin size-5 border-2 border-white/30 border-t-white rounded-full"></span>
                <span class="material-symbols-rounded group-hover:translate-x-1 transition-transform text-[20px]">arrow_forward</span>
            </button>

            <div class="relative my-2">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-800"></div></div>
                <div class="relative flex justify-center"><span class="bg-[#161E26] px-3 text-[10px] font-bold uppercase tracking-widest text-slate-500">o</span></div>
            </div>

            <button type="button" id="google-login-btn"
                class="flex items-center justify-center gap-2 w-full rounded-xl bg-white hover:bg-slate-100 text-slate-900 font-bold py-3 px-6 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" class="size-5"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.659 32.657 29.2 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.048 6.053 29.277 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 16.108 19.001 13 24 13c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.048 6.053 29.277 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.176 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.144 35.091 26.715 36 24 36c-5.179 0-9.624-3.327-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.084 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
                Continuar con Google
            </button>
        </form>

        <div class="mt-6 p-4 rounded-xl border border-slate-800 bg-slate-900/30">
            <p class="text-xs text-slate-400 mb-3">¿No tenés acceso todavía? Sumate al cupo inicial (15 personas).</p>
            <form id="access-request-form" class="flex flex-col gap-2">
                <input id="access-name" type="text" class="w-full bg-slate-900/60 border border-slate-800 rounded-lg px-3 py-2 text-sm text-white" placeholder="Tu nombre" />
                <input id="access-email" type="email" required class="w-full bg-slate-900/60 border border-slate-800 rounded-lg px-3 py-2 text-sm text-white" placeholder="tu@email.com" />
                <button type="submit" class="rounded-lg bg-slate-700 hover:bg-slate-600 text-white text-sm font-bold py-2">Solicitar acceso</button>
                <p id="access-request-feedback" class="hidden text-xs font-bold"></p>
            </form>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-800 text-center">
            <p class="text-slate-500 text-xs"> TechFitness SaaS &copy; 2024 </p>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- App Logic -->
    <script type="module" src="js/supabase.js"></script>
    <script type="module" src="js/training-engine.js"></script>
    <script type="module" src="js/utils.js"></script>
    <script type="module" src="js/routes.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script>
        document.getElementById('email').focus();
        document.getElementById('email').addEventListener('blur', function() {
            this.classList.add('was-validated');
        });
    </script>
</body>
</html>
